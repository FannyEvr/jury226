    <body>


    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>

                <li><a href="galerie.html">Galerie</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>

<div class="slide" id="contact">
    <div class="deco hl">
        <img src="logos/logo%20demi.svg" alt="déco">
        <div class="ligne1"></div>
        <div class="ligne2"></div>
    </div>
    <div class="deco hr">
        <img src="logos/logo%20demi.svg" alt="déco">
        <div class="ligne1"></div>
        <div class="ligne2"></div>
    </div>
    <div class="deco br">
        <img src="logos/logo%20demi.svg" alt="déco">
        <div class="ligne1"></div>
        <div class="ligne2"></div>
    </div>
    <div class="deco bl">
        <img src="logos/logo%20demi.svg" alt="déco">
        <div class="ligne1"></div>
        <div class="ligne2"></div>
    </div>

    <div class="container-contact">
        <div class="wrapper">
            <div class="gauche">
                <h3>Get in touch</h3>
                <div class="title-contact"><img src="images/tel.svg" alt="tel">Call us</div>
                <div class="info-contact">02 / 01 02 03</div>
                <div class="title-contact"><img src="images/location.svg" alt="location">Location</div>
                <div class="info-contact">Rue du village 50 7850 Enghien</div>
                <div class="title-contact"><img src="images/time.svg" alt="time">Business Hours</div>
                <div class="info-contact">8h30 - 16h</div>
            </div>
            <div class="droite">
                <form action="mailto:contact@test.com" method="POST">
                    <h3>Contact Us</h3>
                    <input type="text" name="nom" id="nom" placeholder="Name">
                    <input type="email" name="email" id="email" placeholder="Email">
                    <textarea name="message" id="message"  placeholder="Message"></textarea>
                    <input type="submit" value="Submit">
                </form>
            </div>
        </div>
    </div>
</div>

<img id="logobas" src="logos/logo%20horizontal.svg">
